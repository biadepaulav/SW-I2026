<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilo.css">
    <title> Salário </title>
</head>
<body>
    <main>
        <h1 class="titulo"> Cálculo De Salário</h1>

        <div>

            <form action="index.php" method="post" class="formulario">

                <p>Nome:</p>
                <div>
                    <input type="text" name="nome">
                </div>
                 <p>Salário em reais</p>
                <div>
                    <input type="number" name="salario" min="0" step="0.01" required>
                </div>
                <p>número de faltas</p>
                <div>
                    <input type="number" name="faltas" value="" min="0" max="31" step="1" required>
                </div>
                <p>Tem vale transporte?</p>
                <div>
                    <input type="radio" name="vale" value=true required> Sim
                    <input type="radio" name="vale" value=false required> Não
                </div>

                <div>
                    <button type="submit">Enviar</button>
                </div>

            </form>

        </div>



    </main>
</body>
</html>
